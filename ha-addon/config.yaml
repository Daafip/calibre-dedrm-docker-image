name: "Calibre DeDRM"
description: >
  Watches /share/calibre-dedrm/input for .acsm files and converts them to DRM-free ePubs using libgourou (native ADEPT) + Calibre DeDRM. No Wine required. Output lands in /share/calibre-dedrm/books.
version: "1.9.6"
slug: "calibre_dedrm"
init: false
homeassistant_api: true
panel_icon: mdi:bookshelf
panel_title: Loan books
panel_admin: false
ingress: true
ingress_port: 8099
arch:
- amd64

# Persistent addon data (/data) and HA shared storage (/share)
map:
- share:rw
- data:rw
- media:rw

options:
  # Adobe ID credentials for device activation (required on first run).
  # Activation data is stored in /data/adept/ and persists across restarts.
  adobe_email: ""
  adobe_password: ""
  # After decryption, automatically push the ePub to send2ereader and show
  # the short code in the addon logs. Set to the send2ereader addon's URL,
  # e.g. http://homeassistant.local:3001 or http://<HA-IP>:3001
  # Leave empty to disable.
  send2ereader_url: ""
  # URL of a Calibre-Web instance — shown as a quick link in the upload UI.
  # e.g. http://homeassistant.local:8083 — leave empty to hide.
  calibre_web_url: ""
  # HA notification services to ping when a book is ready (e.g. mobile_app_phone).
  # Uses the Supervisor token — no extra auth needed. Leave empty to disable.
  notify_services: []
  # Path to an existing Calibre library directory to import each book into.
  # e.g. /share/calibre/library — leave empty to disable.
  # The directory will be created as a new empty library if it does not exist.
  calibre_library: ""
  # Email delivery: send the decrypted ePub as an attachment.
  # smtp_host is required to enable; all other fields have sensible defaults.
  email_to: []
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""

schema:
  adobe_email: email
  adobe_password: password
  send2ereader_url: str?
  calibre_web_url: str?
  notify_services:
  - str
  email_to:
  - email
  calibre_library: str?
  smtp_host: str?
  smtp_port: int?
  smtp_user: str?
  smtp_password: password?
