name: "Calibre DeDRM"
description: >
  Watches /share/calibre-dedrm/input for .acsm files and converts them to DRM-free ePubs using libgourou (native ADEPT) + Calibre DeDRM. No Wine required. Output lands in /share/calibre-dedrm/books.
version: "1.7.1"
slug: "calibre_dedrm"
init: false
homeassistant_api: true
panel_icon: mdi:bookshelf
panel_title: Loan books
ingress: true
ingress_port: 8099
arch:
- amd64

# Persistent addon data (/data) and HA shared storage (/share)
map:
- share:rw
- data:rw

options:
  # Adobe ID credentials for device activation (required on first run).
  # Activation data is stored in /data/adept/ and persists across restarts.
  adobe_email: ""
  adobe_password: ""
  # After decryption, automatically push the ePub to send2ereader and show
  # the short code in the addon logs. Set to the send2ereader addon's URL,
  # e.g. http://homeassistant.local:3001 or http://<HA-IP>:3001
  # Leave empty to disable.
  send2ereader_url: ""
  # HA notification services to ping when a book is ready (e.g. mobile_app_phone).
  # Uses the Supervisor token — no extra auth needed. Leave empty to disable.
  notify_services: []

schema:
  adobe_email: email
  adobe_password: password
  send2ereader_url: str
  notify_services:
  - str
