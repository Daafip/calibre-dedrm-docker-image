services:
  calibre:
    build: .
    image: calibre-adept
    container_name: calibre-adept
    ipc: host
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - WINEARCH=win32
      - WINEPREFIX=/home/calibre/wineprefix
      - CALIBRE_CONFIG_DIRECTORY=/home/calibre/calibre-config
      - BOOKS_DIR=/home/calibre/books
      # Headless auth: set to authorize ADE without a GUI.
      # Treat as secrets — use a .env file or HA secrets store.
      - ADOBE_EMAIL=${ADOBE_EMAIL:-}
      - ADOBE_PASSWORD=${ADOBE_PASSWORD:-}
      # Snapshot restore: path inside the container (mount a volume) or https:// URL.
      # If set and the wineprefix is empty, extracts the tarball on first run.
      - WINEPREFIX_SNAPSHOT=${WINEPREFIX_SNAPSHOT:-}
    volumes:
      - ./volumes/wineprefix:/home/calibre/wineprefix
      - ./volumes/calibre-config:/home/calibre/calibre-config
      - ./volumes/books:/home/calibre/books
      - ./volumes/ade-books:/home/calibre/ade-books-input
      - ./volumes/winetricks-cache:/home/calibre/.cache/winetricks
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
